name: Publish Go SDK

on:
  workflow_dispatch:
  push:
    tags:
      - "go-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
        working-directory: sdks/go
