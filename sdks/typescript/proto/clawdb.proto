syntax = "proto3";

package clawdb.v1;

service ClawDBService {
  rpc Health (HealthRequest) returns (HealthResponse);
  rpc CreateSession (CreateSessionRequest) returns (CreateSessionResponse);
  rpc ValidateSession (ValidateSessionRequest) returns (ValidateSessionResponse);
  rpc RevokeSession (RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc Remember (RememberRequest) returns (RememberResponse);
  rpc RememberTyped (RememberTypedRequest) returns (RememberResponse);
  rpc UpdateMemory (UpdateMemoryRequest) returns (UpdateMemoryResponse);
  rpc Search (SearchRequest) returns (SearchResponse);
  rpc Recall (RecallRequest) returns (RecallResponse);
  rpc ListMemories (ListMemoriesRequest) returns (ListMemoriesResponse);
  rpc DeleteMemory (DeleteMemoryRequest) returns (DeleteMemoryResponse);
  rpc Branch (BranchRequest) returns (BranchResponse);
  rpc GetBranch (GetBranchRequest) returns (GetBranchResponse);
  rpc GetBranchByName (GetBranchByNameRequest) returns (GetBranchResponse);
  rpc GetTrunkBranch (GetTrunkBranchRequest) returns (GetBranchResponse);
  rpc ListBranches (ListBranchesRequest) returns (ListBranchesResponse);
  rpc DiscardBranch (DiscardBranchRequest) returns (DiscardBranchResponse);
  rpc ArchiveBranch (ArchiveBranchRequest) returns (ArchiveBranchResponse);
  rpc Merge (MergeRequest) returns (MergeResponse);
  rpc Diff (DiffRequest) returns (DiffResponse);
  rpc Sync (SyncRequest) returns (SyncResponse);
  rpc PushSync (PushSyncRequest) returns (SyncActionResponse);
  rpc PullSync (PullSyncRequest) returns (SyncActionResponse);
  rpc ReconcileSync (ReconcileSyncRequest) returns (SyncActionResponse);
  rpc SyncStatus (SyncStatusRequest) returns (SyncStatusResponse);
  rpc Reflect (ReflectRequest) returns (ReflectResponse);
  rpc ReflectGetFacts (ReflectGetFactsRequest) returns (JsonResponse);
  rpc ReflectListJobs (ReflectListJobsRequest) returns (JsonResponse);
  rpc ReflectGetJob (ReflectGetJobRequest) returns (JsonResponse);
  rpc ReflectGetPreferences (ReflectGetPreferencesRequest) returns (JsonResponse);
  rpc ReflectGetContradictions (ReflectGetContradictionsRequest) returns (JsonResponse);
  rpc ReflectResolveContradiction (ReflectResolveContradictionRequest) returns (JsonResponse);
  rpc ActiveSessionCount (ActiveSessionCountRequest) returns (ActiveSessionCountResponse);
  rpc BeginTx (BeginTxRequest) returns (BeginTxResponse);
  rpc TxRemember (TxRememberRequest) returns (TxRememberResponse);
  rpc TxRememberTyped (TxRememberTypedRequest) returns (TxRememberResponse);
  rpc CommitTx (CommitTxRequest) returns (CommitTxResponse);
  rpc RollbackTx (RollbackTxRequest) returns (RollbackTxResponse);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  map<string, bool> components = 2;
  uint64 uptime_secs = 3;
  string request_id = 4;
}

message CreateSessionRequest {
  string agent_id = 1;
  string role = 2;
  repeated string scopes = 3;
  uint64 ttl_secs = 4;
}

message CreateSessionResponse {
  string id = 1;
  string token = 2;
  string expires_at = 3;
  repeated string scopes = 4;
  string request_id = 5;
}

message ValidateSessionRequest {}

message ValidateSessionResponse {
  string session_id = 1;
  string agent_id = 2;
  string workspace_id = 3;
  string role = 4;
  repeated string scopes = 5;
  string expires_at = 6;
  string request_id = 7;
}

message RevokeSessionRequest {
  string session_id = 1;
}

message RevokeSessionResponse {
  bool revoked = 1;
  string request_id = 2;
}

message RememberRequest {
  string content = 1;
}

message RememberTypedRequest {
  string content = 1;
  string type = 2;
  repeated string tags = 3;
  string metadata_json = 4;
}

message RememberResponse {
  string memory_id = 1;
  bool indexed = 2;
  string request_id = 3;
}

message UpdateMemoryRequest {
  string memory_id = 1;
  string content = 2;
}

message UpdateMemoryResponse {
  bool updated = 1;
  string request_id = 2;
}

message SearchRequest {
  string query = 1;
  uint32 top_k = 2;
  bool semantic = 3;
  string filter_json = 4;
}

message SearchHit {
  string id = 1;
  float score = 2;
  string content = 3;
  string memory_type = 4;
  repeated string tags = 5;
  string metadata_json = 6;
}

message SearchResponse {
  repeated SearchHit hits = 1;
  string request_id = 2;
}

message RecallRequest {
  repeated string memory_ids = 1;
}

message MemoryRecord {
  string id = 1;
  string content = 2;
  string memory_type = 3;
  repeated string tags = 4;
}

message RecallResponse {
  repeated MemoryRecord memories = 1;
  string request_id = 2;
}

message ListMemoriesRequest {
  string type = 1;
  uint32 limit = 2;
}

message ListMemoriesResponse {
  repeated MemoryRecord memories = 1;
  string request_id = 2;
}

message DeleteMemoryRequest {
  string memory_id = 1;
}

message DeleteMemoryResponse {
  bool deleted = 1;
  string request_id = 2;
}

message BranchRequest {
  string name = 1;
  string from = 2;
}

message BranchResponse {
  string branch_id = 1;
  string name = 2;
  string request_id = 3;
}

message BranchRecord {
  string branch_id = 1;
  string branch_json = 2;
}

message GetBranchRequest {
  string branch_id = 1;
}

message GetBranchByNameRequest {
  string name = 1;
}

message GetTrunkBranchRequest {}

message GetBranchResponse {
  BranchRecord branch = 1;
  string request_id = 2;
}

message ListBranchesRequest {}

message ListBranchesResponse {
  repeated BranchRecord branches = 1;
  string request_id = 2;
}

message DiscardBranchRequest {
  string branch_id = 1;
}

message DiscardBranchResponse {
  bool discarded = 1;
  string request_id = 2;
}

message ArchiveBranchRequest {
  string branch_id = 1;
}

message ArchiveBranchResponse {
  bool archived = 1;
  string request_id = 2;
}

message MergeRequest {
  string source = 1;
  string target = 2;
  string strategy = 3;
}

message MergeResponse {
  bool success = 1;
  uint32 applied = 2;
  uint32 skipped = 3;
  uint32 conflicts = 4;
  uint64 duration_ms = 5;
  string request_id = 6;
}

message DiffRequest {
  string branch_id = 1;
  string target = 2;
}

message DiffResponse {
  uint32 added = 1;
  uint32 removed = 2;
  uint32 modified = 3;
  uint32 unchanged = 4;
  float divergence_score = 5;
  string diff_json = 6;
  string request_id = 7;
}

message SyncRequest {}

message SyncResponse {
  uint32 pushed = 1;
  uint32 pulled = 2;
  uint32 conflicts = 3;
  uint64 duration_ms = 4;
  string request_id = 5;
}

message PushSyncRequest {}

message PullSyncRequest {}

message ReconcileSyncRequest {}

message SyncStatusRequest {}

message SyncActionResponse {
  string summary_json = 1;
  string request_id = 2;
}

message SyncStatusResponse {
  string status_json = 1;
  string request_id = 2;
}

message ReflectRequest {}

message ReflectResponse {
  string job_id = 1;
  string status = 2;
  string message = 3;
  bool skipped = 4;
  string request_id = 5;
}

message ReflectGetFactsRequest {
  string agent_id = 1;
}

message ReflectListJobsRequest {
  string agent_id = 1;
  string status = 2;
  uint32 limit = 3;
  uint32 offset = 4;
}

message ReflectGetJobRequest {
  string job_id = 1;
}

message ReflectGetPreferencesRequest {
  string agent_id = 1;
}

message ReflectGetContradictionsRequest {
  string agent_id = 1;
}

message ReflectResolveContradictionRequest {
  string agent_id = 1;
  string contradiction_id = 2;
  string strategy = 3;
  string merged_value_json = 4;
}

message JsonResponse {
  string json = 1;
  string request_id = 2;
}

message ActiveSessionCountRequest {}

message ActiveSessionCountResponse {
  uint64 count = 1;
  string request_id = 2;
}

message BeginTxRequest {}

message BeginTxResponse {
  string tx_id = 1;
  string request_id = 2;
}

message TxRememberRequest {
  string tx_id = 1;
  string content = 2;
}

message TxRememberTypedRequest {
  string tx_id = 1;
  string content = 2;
  string type = 3;
  repeated string tags = 4;
  string metadata_json = 5;
}

message TxRememberResponse {
  string memory_id = 1;
  string request_id = 2;
}

message CommitTxRequest {
  string tx_id = 1;
}

message CommitTxResponse {
  bool committed = 1;
  string request_id = 2;
}

message RollbackTxRequest {
  string tx_id = 1;
}

message RollbackTxResponse {
  bool rolled_back = 1;
  string request_id = 2;
}
